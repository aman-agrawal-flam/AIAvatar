# Local LLM (Ollama) + Edge TTS (no Doubao / no DashScope).
#   Ollama: https://ollama.com — `ollama serve` then `ollama pull llama3.2` (match LLM_MODEL_NAME).
#   TTS: pip install edge-tts; ffmpeg on PATH. (Edge TTS still uses Microsoft’s network; speech is not fully offline.)
#   First-run wav2lip downloads still use HuggingFace (DOWNLOAD).

LLM:
  LLM_API_KEY: "ollama"
  LLM_BASE_URL: "http://127.0.0.1:11434/v1"
  LLM_MODEL_NAME: "llama3.2"

TTS:
  DOUBAO_APPID: ""
  DOUBAO_TOKEN: ""

DOWNLOAD:
  BASE_URL: "https://huggingface.co/shibing624/ai-avatar-wav2lip/resolve/main"
  
  MODELS:
    wav2lip.pth:
      path: "./models/wav2lip.pth"
      size: "215 MB"
      description: "Wav2Lip256 唇形同步生成模型"
  
  AVATARS:
    wav2lip_avatar_female_model:
      url_suffix: "wav2lip_avatar_female_model.zip"
      path: "./data/wav2lip_avatar_female_model.zip"
      size: "353 MB"
      description: "女性数字人形象(含预处理人脸图片)"
    
    wav2lip_avatar_glass_man:
      url_suffix: "wav2lip_avatar_glass_man.zip"
      path: "./data/wav2lip_avatar_glass_man.zip"
      size: "88.4 MB"
      description: "戴眼镜男性数字人形象"
    
    wav2lip_avatar_long_hair_girl:
      url_suffix: "wav2lip_avatar_long_hair_girl.zip"
      path: "./data/wav2lip_avatar_long_hair_girl.zip"
      size: "153 MB"
      description: "长发女性数字人形象"

# 数字人配置
AVATARS:
  default_avatar: "ai_model"
  
  avatars:
    - id: "ai_model"
      name: "AI 模特"
      description: "专业的AI模特，展示时尚、优雅与自信"
      avatar_dir: "wav2lip_avatar_female_model"
      image: "/data/wav2lip_avatar_female_model/full_imgs/00000000.png"
      tts_config:
        type: "edgetts"
        voice: "zh-CN-XiaoxiaoNeural"
    
    - id: "ai_girlfriend"
      name: "AI 女友"
      description: "温柔体贴的AI女友，倾听、关心、陪伴你的每一天"
      avatar_dir: "wav2lip_avatar_long_hair_girl"
      image: "/data/wav2lip_avatar_long_hair_girl/full_imgs/00000000.png"
      tts_config:
        type: "edgetts"
        voice: "zh-CN-XiaoyiNeural"
    
    - id: "ai_assistant"
      name: "AI 助手"
      description: "高效专业的AI助手，帮助你解决工作和学习中的各种问题"
      avatar_dir: "wav2lip_avatar_glass_man"
      image: "/data/wav2lip_avatar_glass_man/full_imgs/00000000.png"
      tts_config:
        type: "edgetts"
        voice: "zh-CN-YunxiNeural"


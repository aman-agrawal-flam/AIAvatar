# Micromamba/conda env for AIAvatar (name: aiavt)
# Bootstrap: ./scripts/setup_aiavt.sh
# Linux + NVIDIA: after create, optionally run:
#   micromamba install -n aiavt pytorch-cuda=12.4 -c nvidia -y
# macOS uses CPU/MPS builds from the pytorch channel (no CUDA package).
name: aiavt
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pytorch==2.5.0
  - torchvision==0.20.0
  - torchaudio==2.5.0
  - pip
  - ffmpeg
  - pip:
    - -r requirements.txt
